<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BREACH</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #05070a;
        color: #d9e2ec;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow: hidden;
        height: 100%;
      }
      #game {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        padding: 16px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      #hud .corner {
        position: absolute;
        padding: 12px 14px;
      }
      #hud .tl { top: 12px; left: 12px; }
      #hud .tr { top: 12px; right: 12px; text-align: right; }
      #hud .bl { bottom: 12px; left: 12px; }
      #hud .br { bottom: 12px; right: 12px; text-align: right; }
      .dim { opacity: 0.6; }
      #minimap {
        display: block;
        background: #05080c;
        border: 1px solid #2a3446;
        image-rendering: pixelated;
      }
      #room-label {
        margin-top: 6px;
      }
      .bar {
        width: 220px;
        height: 10px;
        background: #11161f;
        border: 1px solid #2a3446;
        margin-top: 4px;
      }
      .bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #ff3b3b, #ff6666);
        transition: width 120ms linear;
      }
      #death {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(8, 4, 4, 0.78);
        pointer-events: none;
      }
      #death.show { display: flex; }
      #death .panel {
        text-align: center;
        pointer-events: auto;
      }
      #death h1 {
        font-size: 64px;
        margin: 0 0 8px;
        color: #ff4b4b;
        letter-spacing: 0.2em;
      }
      #death .sub { opacity: 0.7; font-size: 13px; }
      #death button {
        margin-top: 24px;
        background: #ff4b4b;
        color: #0a0a0a;
        border: 0;
        padding: 12px 28px;
        font: inherit;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
      }
      #win {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(4, 10, 6, 0.82);
        pointer-events: none;
      }
      #win.show { display: flex; }
      #win .panel {
        text-align: center;
        pointer-events: auto;
      }
      #win h1 {
        font-size: 64px;
        margin: 0 0 8px;
        color: #66ffaa;
        letter-spacing: 0.2em;
      }
      #win .sub { opacity: 0.75; font-size: 13px; }
      #win button {
        margin-top: 24px;
        background: #66ffaa;
        color: #062014;
        border: 0;
        padding: 12px 28px;
        font: inherit;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
      }
      #upgrade {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(6, 9, 14, 0.85);
        pointer-events: none;
      }
      #upgrade.show { display: flex; }
      #upgrade .panel {
        text-align: center;
        pointer-events: auto;
      }
      #upgrade h2 {
        font-size: 28px;
        letter-spacing: 0.28em;
        color: #d9e2ec;
        margin: 0 0 28px;
      }
      #upgrade-cards {
        display: flex;
        gap: 18px;
      }
      .upgrade-card {
        width: 200px;
        min-height: 180px;
        padding: 20px 18px;
        background: #0d1420;
        border: 1px solid #2a3446;
        color: #d9e2ec;
        font: inherit;
        text-align: left;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: transform 120ms, border-color 120ms, background 120ms;
      }
      .upgrade-card:hover {
        transform: translateY(-4px);
        background: #121c2e;
      }
      .upgrade-card .card-tag {
        font-size: 10px;
        letter-spacing: 0.18em;
        opacity: 0.55;
        text-transform: uppercase;
      }
      .upgrade-card .card-name {
        font-size: 18px;
        font-weight: 600;
        text-transform: none;
        letter-spacing: 0.02em;
      }
      .upgrade-card .card-desc {
        font-size: 11px;
        opacity: 0.72;
        text-transform: none;
        letter-spacing: 0.04em;
      }
      .upgrade-card.offense { border-color: #ff6b6b; }
      .upgrade-card.offense:hover { background: #2a1216; }
      .upgrade-card.defense { border-color: #6bb2ff; }
      .upgrade-card.defense:hover { background: #0f1c2e; }
      .upgrade-card.utility { border-color: #d4c066; }
      .upgrade-card.utility:hover { background: #25200c; }
      #title {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #0a1a2a 0%, #05070a 70%);
        pointer-events: none;
      }
      #title.hidden { display: none; }
      #title .panel {
        text-align: center;
        pointer-events: auto;
      }
      #title h1 {
        font-size: 96px;
        margin: 0 0 12px;
        letter-spacing: 0.25em;
        color: #66b2ff;
        text-shadow: 0 0 32px #0a3a6a;
      }
      #title .tagline {
        font-size: 13px;
        opacity: 0.68;
        letter-spacing: 0.2em;
        margin-bottom: 40px;
      }
      #title .controls-hint {
        font-size: 11px;
        opacity: 0.5;
        letter-spacing: 0.12em;
        margin-top: 24px;
      }
      #title button {
        background: #2b6cd9;
        color: #d9e2ec;
        border: 0;
        padding: 16px 48px;
        font: inherit;
        font-size: 16px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        cursor: pointer;
      }
      #title button:hover { background: #3a82f7; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="hud">
      <div class="corner tl">
        <div class="dim">soldier</div>
        <div id="hp">HP 100 / 100</div>
        <div class="bar"><div class="bar-fill" id="hp-fill" style="width: 100%"></div></div>
      </div>
      <div class="corner tr">
        <canvas id="minimap" width="160" height="120"></canvas>
        <div id="kills">kills 0</div>
        <div class="dim" id="room-label">start</div>
      </div>
      <div class="corner bl">
        <div class="dim">ammo</div>
        <div id="ammo">∞ / ∞</div>
        <div class="dim" style="margin-top:6px">dash</div>
        <div class="bar"><div class="bar-fill" id="dash-fill" style="width:100%; background: linear-gradient(90deg, #2b6cd9, #6ea8ff)"></div></div>
      </div>
      <div class="corner br">
        <div class="dim">WASD move · mouse aim · click fire · space dash</div>
      </div>
    </div>
    <div id="death">
      <div class="panel">
        <h1>KIA</h1>
        <div class="sub" id="death-sub">killed by scuttler</div>
        <button id="death-restart">play again</button>
      </div>
    </div>
    <div id="win">
      <div class="panel">
        <h1>EXTRACTED</h1>
        <div class="sub" id="win-stats">kills 0 · time 0:00</div>
        <button id="win-restart">run again</button>
      </div>
    </div>
    <div id="upgrade">
      <div class="panel">
        <h2>UPGRADE</h2>
        <div id="upgrade-cards"></div>
      </div>
    </div>
    <div id="title">
      <div class="panel">
        <h1>BREACH</h1>
        <div class="tagline">top-down. one life. extract or die.</div>
        <button id="title-play">play</button>
        <div class="controls-hint">WASD move · mouse aim · click fire</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script async src="https://vibej.am/2026/widget.js"></script>
  </body>
</html>
